# Research-industry / community news. Pulled via RSS and shown in a shared
# "What's happening in research" section for every subscriber.
news_feeds:
  - name: "Hacker News (front page)"
    url: "https://hnrss.org/frontpage"
  - name: "MIT News - Research"
    url: "https://news.mit.edu/rss/research"
  - name: "Nature - Latest"
    url: "https://www.nature.com/nature.rss"
  - name: "Science Daily - Top"
    url: "https://www.sciencedaily.com/rss/top/science.xml"
  - name: "Phys.org - Latest"
    url: "https://phys.org/rss-feed/"

# Topic catalog for ResearchPulse.
#
# Each topic is something a subscriber can choose on the signup page, or that a
# local user can follow. The "id" is the value stored in the subscriber
# database; everything else tells the fetchers where to look. To add a new
# domain, append a new entry here (or use `research-pulse follow "<field>"`,
# which appends one automatically) -- this is the ONLY file maintainers need to
# edit to support more fields.
#
# Fields per topic:
#   id              : stable slug stored against subscribers (lowercase, no spaces)
#   label           : human-friendly name shown in emails / signup page
#   keywords        : terms used for relevance ranking and filtering
#   arxiv           : list of arXiv category codes (https://arxiv.org/category_taxonomy)
#   biorxiv         : list of bioRxiv/medRxiv server names ("biorxiv"/"medrxiv") or []
#   openalex        : free-text OpenAlex search query (optional)
#   semanticscholar : free-text Semantic Scholar query -- covers ALL fields (optional)
#   europepmc       : free-text Europe PMC query -- best for life sciences (optional)
#
# Topics WITHOUT arXiv categories (e.g. chemistry, medicine, economics, the
# humanities) rely on openalex/semanticscholar/europepmc, so every research
# domain is covered, not just computer science.
#
# The full built-in catalog is kept below, commented out, as a menu -- only
# the custom topics plus a couple of hand-picked built-ins are active.
# Uncomment any block to bring it back into the digest.

topics:
  # ── Energy access, justice & clean cooking (custom) ────────────────────
  - id: energy-access
    label: "Energy Access & Electrification"
    keywords: ["energy access", "rural electrification", "electrification", "off-grid", "off grid", "mini-grid", "minigrid", "energy poverty", "grid extension"]
    arxiv: []
    biorxiv: []
    openalex: "energy access rural electrification off-grid"

  - id: energy-justice
    label: "Energy Justice"
    keywords: ["energy justice", "just transition", "energy equity", "energy poverty", "energy vulnerability", "distributional justice", "procedural justice", "recognition justice", "climate justice"]
    arxiv: []
    biorxiv: []
    openalex: "energy justice just transition equity"

  - id: abm-development
    label: "Agent-Based Modelling in Developing Countries"
    keywords: ["agent-based model", "agent-based modelling", "ABM", "developing countries", "microsimulation", "complex systems developing world", "energy access modelling"]
    arxiv: ["cs.MA"]
    biorxiv: []
    openalex: "agent-based modelling developing countries"
    semanticscholar: "agent-based model developing countries energy"

  - id: clean-cooking
    label: "Clean Cooking & Affordability"
    keywords: ["clean cooking", "cooking fuel", "cookstove", "improved cookstove", "fuel stacking", "barrier", "enabler", "adoption", "affordability", "transition", "household energy", "energy access"]
    arxiv: []
    biorxiv: []
    openalex: "clean cooking affordability adoption barriers"
    semanticscholar: "clean cooking transition household energy"

  - id: cookstoves
    label: "Cooking Energy & Cost Modeling"
    keywords: ["cookstove", "clean cooking", "LPG", "biogas", "least cost", "cost-benefit", "cost modeling", "fuel choice", "cooking fuel", "LCOE", "tariff","price"]
    arxiv: []
    biorxiv: []
    openalex: "cooking energy & cost modeling"

  - id: gis-satellite
    label: "GIS & Satellite Data for Energy Access"
    keywords: ["GIS", "geospatial", "satellite imagery", "remote sensing", "earth observation", "nighttime lights", "synthetic population", "population mapping", "minigrid detection", "solar panel detection", "geospatial energy planning"]
    arxiv: ["eess.IV"]
    biorxiv: []
    openalex: "GIS remote sensing geospatial energy population mapping"
    semanticscholar: "satellite imagery remote sensing energy infrastructure population mapping"


name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only (no upload)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # trusted publishing to PyPI

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Sync bundled config for wheel
        run: python scripts/sync_bundled.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run && github.event_name == 'release' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload artifacts (dry run)
        if: ${{ inputs.dry_run || github.event_name != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

name: Daily research digest

on:
  schedule:
    # 11:00 UTC ~ morning across US/EU. arXiv indexes new papers after
    # ~midnight US Eastern, so this comfortably catches the latest batch.
    - cron: "0 11 * * *"
  # Allow manual runs (and a dry run) from the Actions tab.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render previews without sending email"
        type: boolean
        default: false

permissions:
  contents: write  # needed to commit the updated dedup cache

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          SUBSCRIBERS_CSV_URL: ${{ secrets.SUBSCRIBERS_CSV_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_KEY: ${{ secrets.SMTP_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SITE_URL: ${{ secrets.SITE_URL }}
          # Optional LLM summaries (leave unset to use abstracts).
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m research_agent.pipeline --dry-run
          else
            python -m research_agent.pipeline
          fi

      - name: Commit updated dedup cache
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/seen.json
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "chore: update dedup cache [skip ci]"
            git push
          fi
